name: openrouter-mcp-multimodal
version: 3.0.0
description: MCP server for OpenRouter — text chat, image analysis + generation, audio analysis + generation, and video analysis + generation (Veo 3.1 / Sora 2 Pro / Seedance / Wan)

image:
  name: ghcr.io/stabgan/openrouter-mcp-multimodal
  tag: latest

entrypoint: ["node", "dist/index.js"]

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      OPENROUTER_API_KEY:
        type: string
        description: OpenRouter API key for authentication
      OPENROUTER_DEFAULT_MODEL:
        type: string
        description: Default model to use if none specified in requests
      DEFAULT_MODEL:
        type: string
        description: Alias for OPENROUTER_DEFAULT_MODEL
    required: ["OPENROUTER_API_KEY"]
  commandFunction: |
    function getCommand(config) {
      const defaultModel =
        config.OPENROUTER_DEFAULT_MODEL || config.DEFAULT_MODEL || "nvidia/nemotron-nano-12b-v2-vl:free";
      return {
        command: "node",
        args: ["dist/index.js"],
        env: {
          OPENROUTER_API_KEY: config.OPENROUTER_API_KEY,
          OPENROUTER_DEFAULT_MODEL: defaultModel,
        },
      };
    }

build:
  dockerfile: Dockerfile
  dockerBuildPath: "."

publish:
  smithery: true
  dockerhub:
    enabled: true
    username: stabgan
    repository: openrouter-mcp-multimodal

config:
  env:
    - name: OPENROUTER_API_KEY
      description: OpenRouter API key for authentication
      required: true
    - name: OPENROUTER_DEFAULT_MODEL
      description: Default model to use if none specified in requests
      required: false
      defaultValue: "nvidia/nemotron-nano-12b-v2-vl:free"
    - name: DEFAULT_MODEL
      description: Alias for OPENROUTER_DEFAULT_MODEL
      required: false
      defaultValue: ""

documentation:
  description: |
    An MCP server that exposes 300+ models from OpenRouter.ai through a unified multimodal tool
    interface — chat, image analysis + generation, audio analysis + generation, and video analysis
    + generation (Veo 3.1, Sora 2 Pro, Seedance, Wan). Structured error taxonomy, MCP 2025 tool
    annotations, path-sandboxed disk output, IPv4/IPv6 SSRF protection.
  usage: |
    This MCP server provides the following tools:
    - chat_completion: Send text or multimodal messages to OpenRouter (reasoning-cutoff aware)
    - analyze_image: Analyze images from files, URLs, or data URLs
    - analyze_audio: Transcribe or analyze WAV/MP3/FLAC/OGG audio
    - analyze_video: Understand video (mp4/mpeg/mov/webm) from files, URLs, or data URLs
    - generate_image: Generate images with disk-sandboxed save_path
    - generate_audio: Generate conversational audio or music with format auto-detection
    - generate_video: Submit async video jobs (Veo 3.1 / Sora 2 Pro / Seedance / Wan), poll, download
    - get_video_status: Resume polling a generate_video job by id
    - search_models: Search and filter available models by capability (vision/audio/video)
    - get_model_info: Get pricing, context length, and capabilities for any model
    - validate_model: Check if a model ID is valid
  link: https://github.com/stabgan/openrouter-mcp-multimodal
